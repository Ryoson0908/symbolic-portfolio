<!DOCTYPE html>
<html lang="ja">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="hm-landing">
  <header class="hm-header" role="banner">
    <div class="hm-header__inner">
      <div class="hm-header__cell hm-header__cell--left">
        <button type="button" class="hm-burger" aria-controls="hm-mobile-panel" aria-expanded="false" id="hm-burger-btn">
          <span class="hm-burger__bar" aria-hidden="true"></span>
          <span class="hm-burger__bar" aria-hidden="true"></span>
          <span class="hm-burger__bar" aria-hidden="true"></span>
        </button>
      </div>

      <div class="hm-header__cell hm-header__cell--center">
        <a class="hm-header__brand" href="index.html" aria-label="RYOSHUN MIYAZATO Home">
          <img
            class="hm-header__logo"
            src="assets/Ryoshun.png"
            alt="RYOSHUN MIYAZATO"
            width="720"
            height="720"
            decoding="async"
          >
        </a>
      </div>

      <div class="hm-header__cell hm-header__cell--right">
        <div class="hm-header__actions">
          <nav class="nav-pills hm-header__nav-desktop" aria-label="Primary">
            <a class="nav-pill" href="about.html">COMPANY</a>
            <a class="nav-pill" href="projects.html">PROJECTS</a>
            <a class="nav-pill" href="#">NEWS</a>
            <a class="nav-pill" href="#">IR</a>
            <a class="nav-pill" href="#">CAREERS</a>
            <a class="nav-pill nav-pill--lang" href="#" lang="en">EN</a>
            <a class="nav-pill nav-pill--icon" href="contact.html" aria-label="Contact email">
              <span class="nav-pill__mail" aria-hidden="true">✉</span>
            </a>
          </nav>
          <span class="hm-header__balance" aria-hidden="true"></span>
        </div>
      </div>
    </div>

    <div class="hm-mobile-panel" id="hm-mobile-panel" hidden>
      <nav class="nav-pills nav-pills--stack" aria-label="Mobile">
        <a class="nav-pill" href="about.html">COMPANY</a>
        <a class="nav-pill" href="projects.html">PROJECTS</a>
        <a class="nav-pill" href="#">NEWS</a>
        <a class="nav-pill" href="#">IR</a>
        <a class="nav-pill" href="#">CAREERS</a>
        <a class="nav-pill nav-pill--lang" href="#" lang="en">EN</a>
        <a class="nav-pill nav-pill--icon" href="contact.html">
          <span class="nav-pill__mail" aria-hidden="true">✉</span>
          <span>CONTACT</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="hm-main" id="main">
    <div class="main-logo-group">
      <h1 class="visually-hidden">RYOSHUN MIYAZATO Inc.</h1>
      <div class="main-logo-group__crop">
        <img
          class="main-logo-group__mark"
          src="assets/Ryoshun.png"
          width="720"
          height="720"
          alt=""
          decoding="async"
        >
      </div>
    </div>
  </main>

  <!-- スクロール量（鳥・文字アニメーション用）。視覚的には余白のみ -->
  <div class="hm-scroll-driver" aria-hidden="true"></div>

  <footer class="hm-footer-anchor" role="contentinfo">
    <a class="footer-pill" href="about.html" id="hm-footer-story" aria-label="COMPANY・自己紹介へ。人間の閃きが生み出し、人間の手が創り出す輝きを、世界へ。">
      <span class="hm-story-flock" id="hm-story-flock">
        <span class="footer-pill__label hm-story-visible" id="hm-story-visible" data-story="人間の閃きが生み出し、人間の手が創り出す輝きを、世界へ。" aria-hidden="true"></span>
        <span class="footer-pill__duck" aria-hidden="true">
          <svg class="footer-pill__duck-svg" viewBox="0 0 48 40" width="36" height="30" role="img">
            <title>duck</title>
            <ellipse cx="22" cy="22" rx="14" ry="12" fill="#fff" stroke="#000" stroke-width="1.6"/>
            <circle cx="30" cy="14" r="9" fill="#fff" stroke="#000" stroke-width="1.6"/>
            <circle cx="33" cy="12" r="2" fill="#000"/>
            <path d="M38 16c4 2 6 6 2 7-2 .5-4-1-4-3" fill="none" stroke="#000" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M8 24c-6 2-6 10 2 8 3-1 5-4 4-7" fill="#fff" stroke="#000" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M34 18l10 2c2.5.5 2.5 4-.2 4.4L36 23" fill="#f6a623" stroke="#000" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
        </span>
      </span>
    </a>
  </footer>

  <script>
    (function () {
      var btn = document.getElementById("hm-burger-btn");
      var panel = document.getElementById("hm-mobile-panel");
      if (!btn || !panel) return;
      function setOpen(open) {
        panel.hidden = !open;
        btn.setAttribute("aria-expanded", open ? "true" : "false");
        document.body.classList.toggle("hm-menu-open", open);
      }
      btn.addEventListener("click", function () {
        setOpen(panel.hidden);
      });
      panel.querySelectorAll("a").forEach(function (a) {
        a.addEventListener("click", function () {
          setOpen(false);
        });
      });
      window.addEventListener("resize", function () {
        if (window.matchMedia("(min-width: 901px)").matches) setOpen(false);
      });
    })();

    (function () {
      var label = document.getElementById("hm-story-visible");
      var flock = document.getElementById("hm-story-flock");
      var driver = document.querySelector(".hm-scroll-driver");
      if (!label || !flock || !driver) return;

      var raw = label.getAttribute("data-story") || "";
      label.removeAttribute("data-story");
      var n = raw.length || 1;
      var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      function escapeHtml(s) {
        var d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function progress() {
        if (reduceMotion) return 1;
        var scrollable = Math.max(
          1,
          document.documentElement.scrollHeight - window.innerHeight
        );
        var y = window.scrollY || document.documentElement.scrollTop || 0;
        var p = y / scrollable;
        if (p < 0) p = 0;
        if (p > 1) p = 1;
        return p;
      }

      /* 鳥のすぐ左にだけ文字を載せる（未表示分は幅を取らない） */
      function renderVisible(wave) {
        var fl = Math.floor(wave);
        if (fl < 0) fl = 0;
        var full = Math.min(n, fl);
        var frac = wave - fl;
        var html = escapeHtml(raw.substring(0, full));
        if (full < n && frac > 0.001) {
          var t = Math.min(1, frac);
          html +=
            '<span class="hm-story-tail" style="opacity:' +
            t +
            '">' +
            escapeHtml(raw.charAt(full)) +
            "</span>";
        }
        label.innerHTML = html;
      }

      function apply() {
        var p = progress();
        var shift = p * -58;
        flock.style.transform = "translateX(" + shift + "vw)";

        /* 先頭「人間の」(3字)はスクロール0付近でも出す */
        var wave = p * (n + 6) + 3;
        renderVisible(wave);
      }

      function fullReveal() {
        flock.style.transform = "";
        label.textContent = raw;
      }

      if (reduceMotion) {
        fullReveal();
        return;
      }

      var ticking = false;
      function onScrollOrResize() {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(function () {
          ticking = false;
          apply();
        });
      }

      apply();
      window.addEventListener("scroll", onScrollOrResize, { passive: true });
      window.addEventListener("resize", onScrollOrResize, { passive: true });
    })();
  </script>
</body>
</html>
