<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | RYOSHUN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html" aria-label="RYOSHUN Home">
        <img src="assets/ryoshun-logo.png" alt="RYOSHUN MIYAZATO logo">
      </a>
      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About me</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html" class="current">Contact</a>
      </nav>
    </div>
  </header>

  <main class="page-shell">
    <section class="section">
      <div class="card">
        <p class="eyebrow">Contact</p>
        <h1 class="about-title">Let's Connect</h1>
      </div>
    </section>

    <section class="section">
      <div class="contact-grid">
        <div class="contact-panel">
          <p class="eyebrow">Message</p>
          <form>
            <label for="name">Name</label>
            <input class="input" id="name" type="text" placeholder="Your name">

            <label for="email">Email</label>
            <input class="input" id="email" type="email" placeholder="you@example.com">

            <label for="message">Message</label>
            <textarea class="textarea" id="message" placeholder="How can we create together?"></textarea>

            <button class="btn" type="submit">Send</button>
          </form>
        </div>

        <aside class="contact-panel">
          <p class="eyebrow">Current Status</p>
          <h3>Gold Coast, Australia</h3>
          <div class="status-clock">
            <p class="subtext">Local Time (AEST)</p>
            <p id="gold-coast-time" class="clock-time">--:--:--</p>
          </div>

          <div class="socials">
            <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">Instagram</a>
            <a href="https://github.com/" target="_blank" rel="noopener noreferrer" aria-label="GitHub">GitHub</a>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script>
    const clockEl = document.getElementById("gold-coast-time");
    const formatter = new Intl.DateTimeFormat("ja-JP", {
      timeZone: "Australia/Brisbane",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hour12: false
    });

    function updateClock() {
      clockEl.textContent = formatter.format(new Date());
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
